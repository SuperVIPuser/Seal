name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > keystore.jks
          ls -la keystore.jks
          keytool -list -keystore keystore.jks -storepass "${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}" 2>&1 || true

      - name: Build & Sign APK
        uses: gradle/gradle-build-action@v3
        env:
          ANDROID_KEYSTORE_FILE: keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        with:
          arguments: clean assembleRelease --no-build-cache
          cache-disabled: true

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Seal-Signed-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
