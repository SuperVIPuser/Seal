name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d cmdline-tools
          mkdir -p ~/android-sdk/cmdline-tools/latest
          mv cmdline-tools/cmdline-tools/* ~/android-sdk/cmdline-tools/latest/
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH" >> $GITHUB_PATH
          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > keystore.jks
          ls -la keystore.jks

      - name: Build & Sign APK
        run: ./gradlew clean assembleRelease --no-build-cache
        env:
          ANDROID_KEYSTORE_FILE: keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}

      # 关键修改：列出所有APK文件，确认路径
      - name: List all generated APK files
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f
          echo "APK files found:"
          ls -laR app/build/outputs/apk/

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Seal-Signed-APK
          path: |
            ./app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
